services:

  coding-challenge1:
    build: ./Challenge1Lann
    container_name: coding-challenge1
    restart: unless-stopped
    ports:
      - "9201:9999"
    read_only: true
    tmpfs: ["/tmp"]
    pids_limit: 64
    mem_limit: 128m
    security_opt: ["no-new-privileges:true"]

  coding-challenge2:
    build: ./Challenge2Lann
